name: Build iOS Unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash
        working-directory: ./cards/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install iOS CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS archive
        run: flutter build ipa --no-codesign

      - name: Package unsigned IPA for SideStore
        run: |
          # SideStore requires an unsigned IPA. Flutter's --no-codesign flag creates
          # an .xcarchive but not always a directly downloadable IPA, so we manually
          # package Runner.app into Payload and zip it as an IPA.
          rm -rf Payload app-release-unsigned.ipa
          mkdir -p Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          (cd Payload/.. && zip -r app-release-unsigned.ipa Payload)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: cards/mobile/app-release-unsigned.ipa
          if-no-files-found: error
